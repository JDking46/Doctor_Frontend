<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Life Savers</title>
    <link rel="stylesheet" href="../css/login.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>

<body>
    <div class="video-background">
        <video autoplay muted loop playsinline id="bg-video">
            <source
                src="https://assets.mixkit.co/videos/preview/mixkit-medical-professional-working-in-a-modern-laboratory-40656-large.mp4"
                type="video/mp4">
        </video>
    </div>
    <main class="login-container">
        <div class="login-card" data-aos="zoom-in">
            <h1 class="login-title">Reset Password</h1>
            <p style="text-align: center; color: #666; margin-bottom: 1rem;">Enter your email to reset your security
                credentials.</p>

            <form class="login-form" id="resetForm">
                <div class="form-group">
                    <label>Account Type</label>
                    <select id="role" class="form-control" required>
                        <option value="patient">Patient</option>
                        <option value="doctor">Doctor</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="Enter your registered email" required>
                </div>

                <div class="form-group">
                    <label>New Password</label>
                    <input type="password" id="new_password" placeholder="Enter new password" required>
                </div>

                <div class="form-group">
                    <label>Confirm New Password</label>
                    <input type="password" id="confirm_password" placeholder="Confirm new password" required>
                </div>

                <button type="submit" class="login-btn">Update Password</button>

                <p class="register-link">Remembered your password? <a href="../index.html">Login here</a></p>
            </form>
        </div>
    </main>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            AOS.init({ duration: 1000, easing: 'ease-in-out', once: true });

            const resetForm = document.getElementById("resetForm");
            resetForm.addEventListener("submit", async (e) => {
                e.preventDefault();

                const role = document.getElementById("role").value;
                const email = document.getElementById("email").value;
                const newPassword = document.getElementById("new_password").value;
                const confirmPassword = document.getElementById("confirm_password").value;

                if (newPassword !== confirmPassword) {
                    alert("Passwords do not match!");
                    return;
                }

                try {
                    const response = await fetch('http://127.0.0.1:8081/api/auth/reset-password', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            email: email,
                            role: role,
                            new_password: newPassword
                        })
                    });

                    if (response.ok) {
                        alert("Password updated successfully! You can now login with your new password.");
                        window.location.href = '../index.html';
                    } else {
                        const error = await response.json();
                        alert("Error: " + (error.detail || "Failed to reset password"));
                    }
                } catch (err) {
                    console.error("Reset Error:", err);
                    alert("Backend connection failed.");
                }
            });
        });
    </script>
</body>

</html>
